name: Backend CI

on:
  pull_request:
    paths:
      - "apps/server/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  server:
    name: Go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build production binary
        run: go build -tags production .
