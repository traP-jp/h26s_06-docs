name: Build Images

on:
  pull_request:
    paths:
      - "apps/server/**"
      - "apps/client/**"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "apps/client/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  packages: write

jobs:
  server:
    name: Build server image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: type=raw,value=latest

      - name: Build and push server image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  client:
    name: Build client image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/client
          tags: type=raw,value=latest

      - name: Build and push client image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/client
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-image-refs:
    name: Update image references
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push image refs to deploy branch
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin deploy; then
            git checkout deploy
          else
            git checkout --orphan deploy
            git rm -rf . 2>/dev/null || true
          fi

          echo "ghcr.io/${REPO}/server@${{ needs.server.outputs.digest }}" > server.image.txt
          echo "ghcr.io/${REPO}/client@${{ needs.client.outputs.digest }}" > client.image.txt

          git add server.image.txt client.image.txt
          git diff --cached --quiet || git commit -m "ci: update image references [skip ci]"
          git push origin deploy
